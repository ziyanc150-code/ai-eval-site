<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>评测平台登录</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="container">
    <h1>多模态 AI 自动化评测平台</h1>
    <p>请输入访问密钥后使用平台（不是 ADMIN_TOKEN 管理员令牌）。</p>
    <p class="hint">
      若一直失败：先打开 <a href="/key-admin.html">密钥管理</a> 保存密钥；或打开
      <a href="/api/health" target="_blank" rel="noreferrer">/api/health</a> 确认 <code>kv_bound</code> 为 true。
    </p>

    <section class="card">
      <h2>登录</h2>
      <label>访问密钥
        <input id="accessKey" type="password" placeholder="请输入密钥" />
      </label>
      <button id="loginBtn" type="button" disabled>请填写密钥</button>
      <p id="statusText"></p>
    </section>
  </main>

  <script src="./js/login.js?v=3"></script>
</body>
</html>
